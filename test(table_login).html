<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>글 작성하기</h1>
    </header>
    <form>
        <fieldset>
            <legend>입력양식</legend>
            <table>
                <tr>
                    <td><label for="name">이름</label></td>
                    <td><input id="name" type="text"></td>
                </tr>

                <tr>
                    <td><label for="mail">이메일</label></td>
                    <td><input id="mail" type="text"></td>
                </tr>

                <!-- 생년월일 yy -->
                <tr>
                    <td><label for="birth_yy">생년월일</label></td>
                    <td><input id="birth_yy" type="text" placeholder="년(4자)"></td>

                <!-- 생년월일 mm -->
                    <td>
                        <select id="birth_mm">
                        <option>월</option>
                        <option value="1">1월</option>
                        <option value="2">2월</option>
                        <option value="3">3월</option>
                        <option value="4">4월</option>
                        <option value="5">5월</option>
                        <option value="6">6월</option>
                        <option value="7">7월</option>
                        <option value="8">8월</option>
                        <option value="9">9월</option>
                        <option value="10">10월</option>
                        <option value="11">11월</option>
                        <option value="12">12월</option>
                    </select>
                </td>

                <!-- 생년월일 dd -->
                    <td><input id="birth_dd" type="text" placeholder="일"></td>
                </tr>
                    <tr>
                        <td>성별</td>
                        <td>
                            <input id="man" type="radio" name="gender" value="m">
                            <label for="man">남자</label>
                            <input id="woman" type="radio" name="gender" value="w">
                            <label for="man">여자</label>
                        </td>
                    </tr>

            </table>
            <input type="submit">
        </fieldset>
    </form>
    <br>
    <footer>HTML5 Programming 게시판</footer>
</body>
</html>
