<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
 <table border="1">
     <!-- 첫번 째 -->
     <tr>
         <th rowspan="2">첫번 째 목록</th>
         <td>디자인</td>
     </tr>
     <!-- <tr> 생략 -->
         <td>
                <ul>
                    <li><b>dont give up dont give up</b></li>
                    <li><i>dont give up dont give up</i></li>
                    <li>dont <sub>give up</sup> dont give up</li>
                    <li>dont <sup>give up</sup> dont give up</li>
                </ul>
        </td>
     <!-- </tr> 생략  -->

     <!-- 두번 째 -->
     <tr>
         <th rowspan="3">두번 째 목록</th>
         <td>디자인 시작</td>
         </tr>
         <!-- <tr> -->
         <td>
             <ol>
                 <li><small>dont give up dont give up</small></li>
                 <li><ins>dont give up dont give up</ins></li>
                 <li><del>dont give up dont give up</del></li>
             </ol>
         </td>
     <tr>
     <td>디자인 끝</td>
     </tr>
 </table>
</body>
</html>
